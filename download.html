<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报名成功 — 百日炼兵成长计划</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0d0505;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  text-align: center;
  padding: 48px 32px;
  max-width: 520px;
  margin: 20px;
}
.icon {
  font-size: 64px;
  margin-bottom: 24px;
}
h1 {
  font-size: 24px;
  color: #ffd700;
  margin-bottom: 8px;
  line-height: 1.4;
}
.desc {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 36px;
}
.doc-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.doc-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,168,83,0.18);
  border-radius: 12px;
  padding: 18px 22px;
  text-align: left;
  gap: 14px;
}
.doc-info {
  flex: 1;
  min-width: 0;
}
.doc-name {
  font-size: 16px;
  font-weight: 700;
  color: #ffd700;
  margin-bottom: 4px;
}
.doc-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
}
.doc-btn {
  flex-shrink: 0;
  display: inline-block;
  padding: 10px 24px;
  background: linear-gradient(135deg, #c41e3a, #a3162a);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  border-radius: 8px;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.doc-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(196,30,58,0.35);
}
.footer-text {
  margin-top: 32px;
  font-size: 13px;
  color: rgba(255,255,255,0.3);
}
/* 活动结束通知 */
.ended-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: linear-gradient(135deg, #1a1a1a, #2d1414);
  border-bottom: 2px solid #c41e3a;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.ended-banner .eb-text {
  color: #ffd700;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
}
.ended-banner .eb-sub {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
}
.ended-banner .eb-close {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5);
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
}
.doc-btn.disabled {
  background: #555;
  cursor: not-allowed;
  pointer-events: none;
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="ended-banner" id="endedBanner">
  <span class="eb-text">活动已结束</span>
  <span class="eb-sub">全新里程碑机制即将上线，敬请期待</span>
  <button class="eb-close" onclick="document.getElementById('endedBanner').style.display='none'">✕</button>
</div>
<div class="card">
  <div class="icon">&#x1F389;</div>
  <h1>恭喜你解锁里程碑「新人报道」</h1>
  <p class="desc">成功参与百日炼兵计划，请选择要下载的资料</p>
  <div class="doc-list">
    <div class="doc-item">
      <div class="doc-info">
        <div class="doc-name">逃顶实战手册</div>
        <div class="doc-desc">精准逃顶 · 实战为王</div>
      </div>
      <a class="doc-btn" href="#" onclick="showEnded();return false;">下载</a>
    </div>
    <div class="doc-item">
      <div class="doc-info">
        <div class="doc-name">顶级游资涨停宝典</div>
        <div class="doc-desc">游资手法 · 涨停逻辑</div>
      </div>
      <a class="doc-btn" href="#" onclick="showEnded();return false;">下载</a>
    </div>
    <div class="doc-item">
      <div class="doc-info">
        <div class="doc-name">领航进阶宝典</div>
        <div class="doc-desc">趋势领航 · 进阶之道</div>
      </div>
      <a class="doc-btn" href="#" onclick="showEnded();return false;">下载</a>
    </div>
  </div>
  <p class="footer-text">弘历软件 · 百日炼兵成长计划</p>
</div>
<script>
function showEnded() {
  alert('活动已结束，全新里程碑机制即将上线，敬请期待！');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>交互测试</title>
<style>
  body{font-family:'Microsoft YaHei',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f5f5f5}
  .box{background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);text-align:center;max-width:320px;width:90%}
  h3{margin:0 0 20px;color:#333}
  input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:16px;text-align:center;box-sizing:border-box;outline:none}
  input:focus{border-color:#4a90d9}
  button{width:100%;margin-top:14px;padding:12px;font-size:16px;color:#fff;background:#4a90d9;border:none;border-radius:6px;cursor:pointer}
  button:active{background:#3a7bc8}
  .msg{margin-top:16px;padding:10px;border-radius:6px;display:none;font-size:14px}
  .msg.ok{display:block;background:#e8f5e9;color:#2e7d32}
  .msg.err{display:block;background:#ffebee;color:#c62828}
</style>
</head>
<body>
<div class="box">
  <h3>代码交互测试</h3>
  <input type="text" id="txt" placeholder="输入任意文字" maxlength="20">
  <button onclick="test()">点击测试</button>
  <div class="msg" id="msg"></div>
</div>
<script>
function test(){
  var v=document.getElementById('txt').value.trim();
  var m=document.getElementById('msg');
  if(!v){m.className='msg err';m.textContent='请输入内容后再测试';return}
  m.className='msg ok';m.textContent='测试成功！你输入了：'+v;
}
</script>
</body>
</html>
